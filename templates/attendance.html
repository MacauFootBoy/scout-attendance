{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-clipboard-check"></i> 點名系統</h2>
    <p class="mb-0">記錄每週集會出席情況</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" id="attendanceForm">
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">集會日期</label>
                    <input type="date" name="date" class="form-control" value="{{ meeting_date }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">集會主題</label>
                    <input type="text" name="theme" class="form-control" value="{{ meeting.theme or '' }}" placeholder="例如：露營準備">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-save"></i> 儲存點名
                    </button>
                    <a href="{{ url_for('attendance_history') }}" class="btn btn-outline-secondary">
                        歷史記錄
                    </a>
                </div>
            </div>
            
            <hr>
            
            {% if scouts %}
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 50px;">編號</th>
                            <th>姓名</th>
                            <th>小隊</th>
                            <th style="width: 120px;">出席</th>
                            <th style="width: 120px;">請假</th>
                            <th style="width: 120px;">缺席</th>
                            <th style="width: 120px;">制服不整</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for scout in scouts %}
                        <tr>
                            <td>{{ scout.id }}</td>
                            <td><strong>{{ scout.name }}</strong></td>
                            <td>{{ scout.troop or '-' }}</td>
                            <td class="text-center">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input status-radio" type="radio" 
                                           name="status_{{ scout.id }}" 
                                           id="present_{{ scout.id }}" 
                                           value="present"
                                           {% if records.get(scout.id) and records[scout.id].status == 'present' %}checked{% endif %}>
                                    <label class="form-check-label text-success" for="present_{{ scout.id }}">
                                        <i class="bi bi-check-circle-fill"></i>
                                    </label>
                                </div>
                            </td>
                            <td class="text-center">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input status-radio" type="radio" 
                                           name="status_{{ scout.id }}" 
                                           id="leave_{{ scout.id }}" 
                                           value="leave"
                                           {% if records.get(scout.id) and records[scout.id].status == 'leave' %}checked{% endif %}>
                                    <label class="form-check-label text-info" for="leave_{{ scout.id }}">
                                        <i class="bi bi-envelope-fill"></i>
                                    </label>
                                </div>
                            </td>
                            <td class="text-center">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input status-radio" type="radio" 
                                           name="status_{{ scout.id }}" 
                                           id="absent_{{ scout.id }}" 
                                           value="absent"
                                           {% if records.get(scout.id) and records[scout.id].status == 'absent' %}checked{% endif %}>
                                    <label class="form-check-label text-danger" for="absent_{{ scout.id }}">
                                        <i class="bi bi-x-circle-fill"></i>
                                    </label>
                                </div>
                            </td>
                            <td class="text-center">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input status-radio" type="radio" 
                                           name="status_{{ scout.id }}" 
                                           id="uniform_{{ scout.id }}" 
                                           value="uniform"
                                           {% if records.get(scout.id) and records[scout.id].status == 'uniform' %}checked{% endif %}>
                                    <label class="form-check-label text-warning" for="uniform_{{ scout.id }}">
                                        <i class="bi bi-exclamation-triangle-fill"></i>
                                    </label>
                                </div>
                            </td>
                            <td>
                                <input type="text" name="note_{{ scout.id }}" class="form-control form-control-sm" 
                                       placeholder="備註" value="{{ records.get(scout.id).note or '' }}">
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            
            <div class="alert alert-info mt-3">
                <i class="bi bi-info-circle"></i> 
                <strong>圖例：</strong>
                <span class="text-success"><i class="bi bi-check-circle-fill"></i> 出席</span> | 
                <span class="text-info"><i class="bi bi-envelope-fill"></i> 請假</span> | 
                <span class="text-danger"><i class="bi bi-x-circle-fill"></i> 缺席</span> | 
                <span class="text-warning"><i class="bi bi-exclamation-triangle-fill"></i> 制服不整</span>
            </div>
            {% else %}
            <div class="text-center py-5 text-muted">
                <i class="bi bi-people display-1"></i>
                <p class="mt-3">尚未添加童軍資料</p>
                <a href="{{ url_for('scouts') }}" class="btn btn-primary">前往添加童軍</a>
            </div>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
